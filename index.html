<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>cmd-find</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <div class="card">
            <h1>cmd-find</h1>
            <p class="subtitle">semantic search on any webpage</p>
            <div class="demo-video-wrapper">
                <video src="demo.mov" autoplay loop muted playsinline></video>
            </div>

            <p class="mobile-description">
                cmd-find is a browser extension that allows you to search for
                text on any webpage using natural language. using leading
                language models, the extension can understand the content of the
                page and find relevant information based on your query.
            </p>

            <a
                id="install-link"
                class="install-link"
                href="#"
                target="_blank"
                rel="noopener"
            >
                install <span class="arrow">→</span>
            </a>
        </div>

        <script src="main.js"></script>
    </body>
</html>
